kind = "web"
previewPath = "/"
title = "LiturgiaFlow Pro"
version = "1.0.0"
id = "artifacts/liturgia-flow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18211

[services.development]
run = "pnpm --filter @workspace/liturgia-flow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/liturgia-flow", "run", "build" ]
publicDir = "artifacts/liturgia-flow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18211"
BASE_PATH = "/"
