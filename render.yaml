# Render Blueprint — LiturgiaFlow Pro
# https://render.com/docs/blueprint-spec

services:
  # Express API + PostgreSQL
  - type: web
    name: liturgiaflow-api
    runtime: node
    plan: free
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@latest --activate &&
      pnpm install &&
      pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: "10000"

  # React PWA (static site)
  - type: web
    name: liturgiaflow-web
    runtime: static
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@latest --activate &&
      pnpm install &&
      PORT=3000 BASE_PATH=/ pnpm --filter @workspace/liturgia-flow run build
    staticPublishPath: artifacts/liturgia-flow/dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: liturgiaflow-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
