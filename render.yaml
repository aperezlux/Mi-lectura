# Render Blueprint — LiturgiaFlow Pro
# https://render.com/docs/blueprint-spec

services:
  # Express API + PostgreSQL
  - type: web
    name: mi-lectura-api
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: "10000"

  # React PWA (static site)
  - type: web
    name: mi-lectura-web
    runtime: static
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@11.2.2 --activate &&
      pnpm install &&
      PORT=3000 BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/liturgia-flow run build
    staticPublishPath: artifacts/liturgia-flow/dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: mi-lectura-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
